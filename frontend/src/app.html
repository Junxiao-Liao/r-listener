<!doctype html>

<html lang="en" dir="ltr">
	<head>
		<meta charset="utf-8" />
		<script>
			(() => {
				const cookies = Object.fromEntries(
					document.cookie
						.split(';')
						.map((part) => part.trim())
						.filter(Boolean)
						.map((part) => {
							const eq = part.indexOf('=');
							return eq < 0 ? [part, ''] : [part.slice(0, eq), part.slice(eq + 1)];
						})
				);
				let theme = 'system';
				try {
					theme = cookies.theme ? decodeURIComponent(cookies.theme) : 'system';
				} catch {}
				if (!['system', 'light', 'dark'].includes(theme)) theme = 'system';
				const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches === true;
				const dark = theme === 'dark' || (theme === 'system' && prefersDark);
				document.documentElement.classList.toggle('dark', dark);
				document.documentElement.style.colorScheme = dark ? 'dark' : 'light';

				let lang = 'en';
				try {
					lang = cookies.PARAGLIDE_LOCALE ? decodeURIComponent(cookies.PARAGLIDE_LOCALE) : 'en';
				} catch {}
				if (!['en', 'zh'].includes(lang)) lang = 'en';
				document.documentElement.lang = lang;
			})();
		</script>

		<meta
			name="viewport"
			content="width=device-width, initial-scale=1"
		/>

		<meta name="text-scale" content="scale" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover"><div style="display: contents">%sveltekit.body%</div></body>
</html>
