name: Update FILE_TREE.md

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: update-file-tree-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    # Skip PRs from forks — GITHUB_TOKEN can't push to a fork's branch.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install tree
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Regenerate FILE_TREE.md
        run: |
          {
            echo "File Tree"
            echo
            echo "_Auto-generated by GitHub Actions. Do not edit by hand._"
            echo
            echo '```'
            git ls-files | tree --fromfile --noreport .
            echo '```'
          } > FILE_TREE.md

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- FILE_TREE.md; then
            echo "FILE_TREE.md already up to date."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add FILE_TREE.md
          git commit -m "chore: update FILE_TREE.md"
          git push