name = "r-listener"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "../frontend/build"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "r-listener"
database_id = "32658b71-2f7d-4c67-aee9-c55f227267b3"
migrations_dir = "drizzle"

[[r2_buckets]]
binding = "R2"
bucket_name = "r-listener-audio"

[observability]
[observability.logs]
enabled = true
invocation_logs = true

# Auth secrets live in `.dev.vars` locally and `wrangler secret put` in prod:
#   SESSION_SECRET = "<random>"
